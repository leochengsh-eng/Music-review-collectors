name: Weekly Album Review Digest

on:
  schedule:
    - cron: "0 2 * * 2"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-pages:
    runs-on: ubuntu-latest
    env:
      REPORT_TIMEZONE: Asia/Shanghai
      REPORT_LOOKBACK_DAYS: 14
      EMAIL_ENABLED: "false"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run weekly digest
        run: python -m src.main --mode weekly
      - name: Commit generated digest files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs outputs/csv outputs/json logs
          git commit -m "Update weekly album review digest" || echo "No changes to commit"
          git push
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: album-review-weekly-digest
          path: |
            docs/
            outputs/csv/
            outputs/json/
            logs/

  deploy-pages:
    needs: build-pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
